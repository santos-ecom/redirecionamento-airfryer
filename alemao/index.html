<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
    <!-- meta refresh substituído por JS para repassar UTMs -->
  <title>Redirecionando...</title>
  <script>
    (function() {
      var dest = "https://forseniors.shop/pages/airfryer-alemao";
      var params = window.location.search;
      if (params) {
        dest += (dest.indexOf('?') === -1 ? params : params.replace('?', '&'));
      }
      window.location.replace(dest);
    })();
  </script>
</head>
<body></body>
</html>
